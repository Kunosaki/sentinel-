<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f2f6"/>
      <stop offset="100%" stop-color="#e5e5ea"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.65)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Window background -->
  <rect width="800" height="600" rx="12" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="44" rx="12" fill="url(#titlebar)"/>
  <rect x="0" y="32" width="800" height="12" fill="url(#titlebar)"/>

  <!-- Traffic light controls -->
  <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="22" r="6" fill="#febc2e"/>
  <circle cx="60" cy="22" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="13" fill="#888" font-weight="500">Sentinel</text>

  <!-- Dark/Light toggle -->
  <rect x="755" y="14" width="16" height="16" rx="8" fill="#555"/>
  <text x="763" y="26" text-anchor="middle" font-size="10" fill="#fff">☾</text>

  <!-- Tab bar -->
  <rect x="0" y="44" width="800" height="44" fill="#fff" fill-opacity="0.5"/>
  <rect x="30" y="54" width="80" height="24" rx="6" fill="#007aff"/>
  <text x="70" y="70" text-anchor="middle" font-size="13" fill="#fff" font-weight="500">Scan</text>
  <rect x="120" y="54" width="90" height="24" rx="6" fill="transparent"/>
  <text x="165" y="70" text-anchor="middle" font-size="13" fill="#555" font-weight="500">Quarantine</text>

  <!-- Content area -->
  <!-- Drop zone -->
  <rect x="50" y="110" width="700" height="180" rx="12" fill="#fff" fill-opacity="0.6" stroke="#c7c7cc" stroke-width="1.5" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <text x="400" y="180" text-anchor="middle" font-size="18" fill="#8e8e93">Drop files or folders here</text>
  <text x="400" y="205" text-anchor="middle" font-size="13" fill="#aeaeb2">or</text>
  <rect x="320" y="218" width="160" height="32" rx="16" fill="#007aff"/>
  <text x="400" y="239" text-anchor="middle" font-size="13" fill="#fff" font-weight="500">Select Files</text>

  <!-- Full scan button -->
  <rect x="320" y="305" width="160" height="36" rx="18" fill="#ff3b30"/>
  <text x="400" y="328" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">Scan Entire Computer</text>

  <!-- Stats bar -->
  <rect x="50" y="360" width="700" height="60" rx="10" fill="#fff" fill-opacity="0.5" filter="url(#shadow)"/>
  <text x="130" y="392" text-anchor="middle" font-size="22" fill="#ff3b30" font-weight="700">0</text>
  <text x="130" y="408" text-anchor="middle" font-size="11" fill="#8e8e93">Threats</text>
  <line x1="260" y1="375" x2="260" y2="405" stroke="#c7c7cc" stroke-width="0.5"/>
  <text x="330" y="392" text-anchor="middle" font-size="22" fill="#34c759" font-weight="700">1,247</text>
  <text x="330" y="408" text-anchor="middle" font-size="11" fill="#8e8e93">Scanned</text>
  <line x1="470" y1="375" x2="470" y2="405" stroke="#c7c7cc" stroke-width="0.5"/>
  <text x="560" y="392" text-anchor="middle" font-size="22" fill="#007aff" font-weight="700">3</text>
  <text x="560" y="408" text-anchor="middle" font-size="11" fill="#8e8e93">Quarantined</text>

  <!-- Results list -->
  <rect x="50" y="435" width="700" height="40" rx="8" fill="#fff" fill-opacity="0.4"/>
  <circle cx="75" cy="455" r="4" fill="#34c759"/>
  <text x="90" y="459" font-size="13" fill="#333">C:\Users\...\document.pdf</text>
  <text x="730" y="459" text-anchor="end" font-size="12" fill="#8e8e93">Safe</text>

  <rect x="50" y="480" width="700" height="40" rx="8" fill="#fff" fill-opacity="0.4"/>
  <circle cx="75" cy="500" r="4" fill="#ff9500"/>
  <text x="90" y="504" font-size="13" fill="#333">C:\Users\...\setup.exe</text>
  <text x="730" y="504" text-anchor="end" font-size="12" fill="#ff9500">Suspicious</text>

  <rect x="50" y="525" width="700" height="40" rx="8" fill="#fff" fill-opacity="0.4"/>
  <circle cx="75" cy="545" r="4" fill="#ff3b30"/>
  <text x="90" y="549" font-size="13" fill="#333">C:\Users\...\invoice.docm</text>
  <text x="730" y="549" text-anchor="end" font-size="12" fill="#ff3b30">Critical</text>

  <!-- Bottom status bar -->
  <rect x="0" y="575" width="800" height="25" fill="#f2f2f6"/>
  <text x="20" y="591" font-size="11" fill="#8e8e93">Scanner engine v1.0.0</text>
  <text x="780" y="591" text-anchor="end" font-size="11" fill="#8e8e93">Last scan: just now</text>
</svg>
